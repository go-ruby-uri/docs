site_name: go-ruby-uri docs
site_description: "Ruby's URI parse, build & normalize in pure Go — MRI-compatible, no cgo."
site_url: https://go-ruby-uri.github.io/docs/
repo_url: https://github.com/go-ruby-uri
repo_name: go-ruby-uri
edit_uri: ""

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
  palette:
    # System default (follows the OS preference), then explicit light and dark.
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

extra:
  version:
    provider: mike
    default: latest

nav:
  - Home: index.md
  - Why pure Go: why.md
  - Usage & API: api.md
  - Roadmap: roadmap.md
  - Performance: performance.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
